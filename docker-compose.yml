version: '3.9'

services:
  # ── Flask Backend ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devagent-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - FLASK_ENV=production
    ports:
      - "5000:5000"
    volumes:
      - ./prompts:/app/prompts   # persist custom prompts
    networks:
      - devagent-net

  # ── React Frontend (Nginx) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devagent-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - devagent-net

networks:
  devagent-net:
    driver: bridge
